services:
  frontend:
    container_name: web-app
    build:
      context: ./web-app
      dockerfile: Dockerfile
    ports:
      - "${WEB_APP_PORT}:${WEB_APP_PORT}"
    volumes:
      - ./web-app:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    container_name: web-api
    build:
      context: ./web-api
      dockerfile: Dockerfile
    ports:
      - "${WEB_API_PORT}:${WEB_API_PORT}"
    volumes:
      - ./web-api:/app
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URL=mongodb://mongo:27017/avyro
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    container_name: mongo-db
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  mongo_data:
